<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Breathing Exercise</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
    }

    body {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        background: linear-gradient(135deg, #0f172a, #1e293b);
        color: white;
        overflow: hidden;
    }

    .circle {
        width: 180px;
        height: 180px;
        border-radius: 50%;
        background: radial-gradient(circle, #60a5fa, #2563eb);
        box-shadow: 0 0 30px rgba(96, 165, 250, 0.6);
        transition: transform linear;
    }

    h1 {
        margin-top: 40px;
        font-size: 2rem;
    }

    p {
        margin-top: 15px;
        font-size: 1.2rem;
        opacity: 0.9;
    }

    .timer {
        margin-top: 10px;
        font-size: 3rem;
        font-weight: bold;
        color: #93c5fd;
    }
</style>
</head>
<body>

<div class="circle" id="circle"></div>

<h1 id="phase">Inhale</h1>
<p id="instruction">Inhale slowly through your nose</p>
<div class="timer" id="timer">4</div>

<script>
const circle = document.getElementById("circle");
const phaseEl = document.getElementById("phase");
const instructionEl = document.getElementById("instruction");
const timerEl = document.getElementById("timer");

const phases = [
    {
        name: "Inhale",
        instruction: "Inhale slowly through your nose",
        duration: 5,
        scale: 1.5
    },
    {
        name: "Hold",
        instruction: "Hold your breath",
        duration: 7,
        scale: 1.5
    },
    {
        name: "Exhale",
        instruction: "Exhale steadily through your mouth",
        duration: 8,
        scale: 1
    }
];

let currentPhase = 0;

function startPhase() {
    const phase = phases[currentPhase];

    phaseEl.textContent = phase.name;
    instructionEl.textContent = phase.instruction;

    circle.style.transitionDuration = `${phase.duration}s`;
    circle.style.transform = `scale(${phase.scale})`;

    let remaining = phase.duration;
    timerEl.textContent = remaining;

    const countdown = setInterval(() => {
        remaining--;
        timerEl.textContent = remaining;

        if (remaining <= 0) {
            clearInterval(countdown);

            currentPhase = (currentPhase + 1) % phases.length;
            startPhase();
        }
    }, 1000);
}

startPhase();
</script>

</body>
</html>
